<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽天リサーチ 電話アプリ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

    :root {
      --rakuten-red: #BF0000;
      --rakuten-dark: #8B0000;
      --rakuten-light: #FFE8E8;
      --rakuten-pale: #FFF5F5;
      --white: #FFFFFF;
      --gray-50: #FAFAFA;
      --gray-100: #F5F5F5;
      --gray-200: #EEEEEE;
      --gray-400: #BDBDBD;
      --gray-600: #757575;
      --gray-800: #424242;
      --text: #212121;
      --success: #2E7D32;
      --success-bg: #E8F5E9;
      --warning: #E65100;
      --warning-bg: #FFF3E0;
      --info: #1565C0;
      --info-bg: #E3F2FD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--gray-100);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: var(--rakuten-red);
      color: var(--white);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      font-size: 24px;
      background: white;
      color: var(--rakuten-red);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -1px;
    }
    .logo-text {
      line-height: 1.2;
    }
    .logo-text .main { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }
    .logo-text .sub  { font-size: 10px; opacity: 0.85; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-header {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-header:hover { background: rgba(255,255,255,0.3); }

    /* ===== ダッシュボード ===== */
    .dashboard {
      background: var(--rakuten-dark);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .stat-box {
      flex: 1;
      min-width: 68px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .stat-val { font-size: 22px; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 10px; opacity: 0.85; margin-top: 3px; }

    /* ===== 同期ステータスバー ===== */
    .sync-bar {
      background: var(--gray-200);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray-600);
    }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gray-400);
      display: inline-block;
      margin-right: 5px;
    }
    .sync-dot.ok    { background: #4CAF50; }
    .sync-dot.error { background: #F44336; }
    .sync-dot.loading { background: #FF9800; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* ===== フィルターバー ===== */
    .filter-bar {
      background: var(--white);
      padding: 10px 16px;
      border-bottom: 2px solid var(--gray-200);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--rakuten-red); color: var(--rakuten-red); }
    .filter-btn.active {
      background: var(--rakuten-red);
      border-color: var(--rakuten-red);
      color: var(--white);
    }

    /* ===== カードリスト ===== */
    .card-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
    }

    .maker-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      border-left: 5px solid var(--gray-200);
      transition: border-color 0.2s;
    }
    .maker-card.status-called  { border-left-color: var(--success); }
    .maker-card.status-nocall  { border-left-color: var(--gray-400); }
    .maker-card.status-unreachable { border-left-color: var(--info); }
    .maker-card.status-deal-ok { background: linear-gradient(135deg, #FAFFFE, #F0FFF4); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-info { flex: 1; min-width: 0; }
    .row-badge {
      font-size: 10px;
      color: var(--gray-400);
      margin-bottom: 2px;
    }
    .company-name {
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.3;
    }
    .phone-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .phone-number {
      font-size: 16px;
      font-weight: 700;
      color: var(--rakuten-red);
      letter-spacing: 0.5px;
    }
    .no-phone { color: var(--gray-400); font-size: 13px; }
    .tel-btn {
      background: var(--rakuten-red);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: background 0.15s;
    }
    .tel-btn:hover { background: var(--rakuten-dark); }

    .product-name {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 4px;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      line-height: 1.4;
    }
    .product-name .label {
      flex-shrink: 0;
      background: var(--rakuten-light);
      color: var(--rakuten-red);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 1px;
    }

    .rakuten-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--rakuten-red);
      text-decoration: none;
      margin-top: 4px;
      font-weight: 500;
    }
    .rakuten-link:hover { text-decoration: underline; }

    /* ===== ステータス操作 ===== */
    .status-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-600);
      min-width: 70px;
    }
    .status-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--gray-600);
    }
    .status-btn:hover { border-color: var(--rakuten-red); color: var(--rakuten-red); }
    .status-btn.active-called     { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .status-btn.active-nocall     { background: var(--gray-100); border-color: var(--gray-400); color: var(--gray-600); }
    .status-btn.active-unreachable { background: var(--info-bg); border-color: var(--info); color: var(--info); }
    .status-btn.active-deal-ok    { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .status-btn.active-deal-ng    { background: var(--warning-bg); border-color: var(--warning); color: var(--warning); }
    .status-btn.saving {
      opacity: 0.6;
      pointer-events: none;
    }

    /* ===== 設定モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h2 {
      font-size: 18px;
      font-weight: 900;
      color: var(--rakuten-red);
      margin-bottom: 8px;
    }
    .modal p { font-size: 13px; color: var(--gray-600); line-height: 1.6; margin-bottom: 16px; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--rakuten-red); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-save {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: var(--rakuten-red);
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-save:hover { background: var(--rakuten-dark); }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gray-800);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 空状態 ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ===== フッター ===== */
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 11px;
      color: var(--gray-400);
      border-top: 1px solid var(--gray-200);
      margin-top: 20px;
    }
    .footer .designer { color: var(--rakuten-red); font-weight: 700; }

    /* ===== ローディング ===== */
    .loading-spinner {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
      font-size: 14px;
    }
    .loading-spinner.show { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--rakuten-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">楽</div>
      <div class="logo-text">
        <div class="main">楽天リサーチ 電話アプリ</div>
        <div class="sub">UIデザイン: シルクプリマドンナ</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-header" onclick="syncNow()">🔄 同期</button>
      <button class="btn-header" onclick="openSettings()">⚙️</button>
    </div>
  </div>
</div>

<!-- ダッシュボード -->
<div class="dashboard">
  <div class="stat-box">
    <div class="stat-val" id="stat-total">0</div>
    <div class="stat-lbl">総件数</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-called">0</div>
    <div class="stat-lbl">電話済み</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-unreachable">0</div>
    <div class="stat-lbl">不通</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-estimate">0</div>
    <div class="stat-lbl">見積OK</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-refused">0</div>
    <div class="stat-lbl">断られた</div>
  </div>
</div>

<!-- 同期バー -->
<div class="sync-bar">
  <span><span class="sync-dot" id="sync-dot"></span><span id="sync-status">未接続</span></span>
  <span id="sync-time"></span>
</div>

<!-- フィルターバー -->
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">すべて</button>
  <button class="filter-btn"        data-filter="未対応"  onclick="setFilter('未対応')">📋 未対応</button>
  <button class="filter-btn"        data-filter="called"  onclick="setFilter('called')">✅ 電話済み</button>
  <button class="filter-btn"        data-filter="nocall"  onclick="setFilter('nocall')">🚫 電話しない</button>
  <button class="filter-btn"        data-filter="unreachable" onclick="setFilter('unreachable')">📵 不通</button>
  <button class="filter-btn"        data-filter="estimate" onclick="setFilter('estimate')">💰 見積OK</button>
  <button class="filter-btn"        data-filter="refused"  onclick="setFilter('refused')">❌ 断られた</button>
</div>

<!-- ローディング -->
<div class="loading-spinner show" id="loading">
  <div class="spinner"></div>
  データを読み込み中...
</div>

<!-- カードリスト -->
<div class="card-list" id="card-list"></div>

<!-- フッター -->
<div class="footer" id="footer" style="display:none">
  <div>楽天リサーチ 電話管理アプリ</div>
  <div>UIデザイン: <span class="designer">シルクプリマドンナ</span> ｜ PM: アドミラブル</div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ GAS URL 設定</h2>
    <p>
      Google Apps Script の Web App URL を貼り付けてください。<br>
      同梱の <code>260422_楽天リサーチ電話アプリ_GAS.gs</code> をデプロイして取得したURLです。
    </p>
    <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/XXXX/exec">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save"   onclick="saveSettings()">保存して同期</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== 設定 =====
const STORAGE_KEY = 'rakuten_gas_url_v2';
let GAS_URL = localStorage.getItem(STORAGE_KEY) || '';

// ===== データ =====
let allRows = [];       // シートから取得した全行データ
let statuses = {};      // { rowNumber: { telStatus, dealStatus } } ローカルキャッシュ
let currentFilter = 'all';

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', () => {
  loadLocalStatuses();
  if (GAS_URL) {
    syncNow();
  } else {
    document.getElementById('loading').classList.remove('show');
    setSyncStatus('GAS URLを設定してください', 'error');
    openSettings();
  }
});

// ===== ローカルキャッシュ =====
function loadLocalStatuses() {
  try {
    statuses = JSON.parse(localStorage.getItem('rakuten_statuses_v2') || '{}');
  } catch(e) { statuses = {}; }
}
function saveLocalStatuses() {
  try { localStorage.setItem('rakuten_statuses_v2', JSON.stringify(statuses)); } catch(e) {}
}
function getStatus(row) {
  return statuses[row] || { telStatus: '', dealStatus: '' };
}

// ===== GAS同期 =====
async function syncNow() {
  if (!GAS_URL) { openSettings(); return; }
  setSyncStatus('同期中...', 'loading');
  document.getElementById('loading').classList.add('show');
  try {
    const res = await fetch(GAS_URL + '?action=get&t=' + Date.now());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'APIエラー');

    allRows = data.rows;
    // サーバー側のステータスでローカルキャッシュを更新
    for (const r of allRows) {
      statuses[r.row] = {
        telStatus:  r.telStatus  || '',
        dealStatus: r.dealStatus || ''
      };
    }
    saveLocalStatuses();

    const now = new Date();
    setSyncStatus('同期済み', 'ok');
    document.getElementById('sync-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0') + ' 更新';
    showToast(`✅ ${allRows.length}件を読み込みました`);
  } catch (err) {
    setSyncStatus('同期エラー: ' + err.message, 'error');
    showToast('❌ 同期失敗: ' + err.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('footer').style.display = '';
    renderCards();
  }
}

// ===== シートへ即時書き込み =====
async function pushStatus(rowNum, telStatus, dealStatus) {
  if (!GAS_URL) return;
  const body = { action: 'update', row: rowNum };
  if (telStatus  !== undefined) body.telStatus  = telStatus;
  if (dealStatus !== undefined) body.dealStatus = dealStatus;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
  } catch (err) {
    showToast('⚠️ 書き込みエラー: ' + err.message);
  }
}

// ===== ステータス操作 =====
async function setTelStatus(rowNum, value, btns) {
  // トグル（同じ値なら解除）
  const cur = getStatus(rowNum).telStatus;
  const newVal = cur === value ? '' : value;
  statuses[rowNum] = { ...getStatus(rowNum), telStatus: newVal };
  saveLocalStatuses();
  renderBtnsState(rowNum);
  renderDashboard();

  // ボタンをセービング状態に
  btns.forEach(b => b.classList.add('saving'));
  await pushStatus(rowNum, newVal, undefined);
  btns.forEach(b => b.classList.remove('saving'));

  // カードのボーダー色更新
  const card = document.getElementById('card-' + rowNum);
  if (card) updateCardClass(card, newVal, getStatus(rowNum).dealStatus);
  showToast('保存しました (' + (newVal || '解除') + ')');
}

async function setDealStatus(rowNum, value, btns) {
  const cur = getStatus(rowNum).dealStatus;
  const newVal = cur === value ? '' : value;
  statuses[rowNum] = { ...getStatus(rowNum), dealStatus: newVal };
  saveLocalStatuses();
  renderBtnsState(rowNum);
  renderDashboard();

  btns.forEach(b => b.classList.add('saving'));
  await pushStatus(rowNum, undefined, newVal);
  btns.forEach(b => b.classList.remove('saving'));

  const card = document.getElementById('card-' + rowNum);
  if (card) updateCardClass(card, getStatus(rowNum).telStatus, newVal);
  showToast('保存しました (' + (newVal || '解除') + ')');
}

function updateCardClass(card, telStatus, dealStatus) {
  card.className = 'maker-card';
  if (telStatus === '◯') card.classList.add('status-called');
  else if (telStatus === '×') card.classList.add('status-nocall');
  else if (telStatus === '不通') card.classList.add('status-unreachable');
  if (dealStatus === '◯') card.classList.add('status-deal-ok');
}

function renderBtnsState(rowNum) {
  const s = getStatus(rowNum);
  // tel buttons
  const telMap = {
    '◯': 'active-called',
    '×': 'active-nocall',
    '不通': 'active-unreachable'
  };
  for (const [val, cls] of Object.entries(telMap)) {
    const btn = document.getElementById(`tel-${rowNum}-${val}`);
    if (btn) {
      btn.className = 'status-btn' + (s.telStatus === val ? ' ' + cls : '');
    }
  }
  // deal buttons
  const dealMap = { '◯': 'active-deal-ok', '×': 'active-deal-ng' };
  for (const [val, cls] of Object.entries(dealMap)) {
    const btn = document.getElementById(`deal-${rowNum}-${val}`);
    if (btn) {
      btn.className = 'status-btn' + (s.dealStatus === val ? ' ' + cls : '');
    }
  }
}

// ===== フィルター =====
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  renderCards();
}

function matchesFilter(row) {
  const s = getStatus(row.row);
  if (currentFilter === 'all')         return true;
  if (currentFilter === '未対応')       return !s.telStatus;
  if (currentFilter === 'called')       return s.telStatus === '◯';
  if (currentFilter === 'nocall')       return s.telStatus === '×';
  if (currentFilter === 'unreachable')  return s.telStatus === '不通';
  if (currentFilter === 'estimate')     return s.dealStatus === '◯';
  if (currentFilter === 'refused')      return s.dealStatus === '×';
  return true;
}

// ===== レンダリング =====
function renderCards() {
  const list = document.getElementById('card-list');
  const filtered = allRows.filter(matchesFilter);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>該当するデータがありません</p>
      </div>`;
    renderDashboard();
    return;
  }

  list.innerHTML = filtered.map(row => buildCard(row)).join('');
  // イベント再アタッチはグローバル関数経由なのでOK
  renderDashboard();
}

function buildCard(row) {
  const s = getStatus(row.row);
  const cardCls = ['maker-card',
    s.telStatus === '◯'    ? 'status-called' : '',
    s.telStatus === '×'    ? 'status-nocall' : '',
    s.telStatus === '不通'  ? 'status-unreachable' : '',
    s.dealStatus === '◯'   ? 'status-deal-ok' : ''
  ].filter(Boolean).join(' ');

  const telBtnBase = (val, label, activeCls) => {
    const isActive = s.telStatus === val;
    return `<button id="tel-${row.row}-${val}" class="status-btn${isActive ? ' '+activeCls : ''}"
      onclick="onTelClick(${row.row}, '${val}')">${label}</button>`;
  };
  const dealBtnBase = (val, label, activeCls) => {
    const isActive = s.dealStatus === val;
    return `<button id="deal-${row.row}-${val}" class="status-btn${isActive ? ' '+activeCls : ''}"
      onclick="onDealClick(${row.row}, '${val}')">${label}</button>`;
  };

  const phoneHtml = row.phone
    ? `<span class="phone-number">${escapeHtml(row.phone)}</span>
       <a class="tel-btn" href="tel:${escapeHtml(row.phone)}">📞 発信</a>`
    : `<span class="no-phone">電話番号なし</span>`;

  const productHtml = row.product
    ? `<div class="product-name"><span class="label">売れ筋</span><span>${escapeHtml(row.product)}</span></div>`
    : '';

  const rakutenHtml = row.rakutenUrl
    ? `<a class="rakuten-link" href="${escapeHtml(row.rakutenUrl)}" target="_blank">🛒 楽天ページを開く</a>`
    : '';

  return `
<div class="maker-card ${cardCls}" id="card-${row.row}">
  <div class="card-top">
    <div class="card-info">
      <div class="row-badge">Row ${row.row}</div>
      <div class="company-name">${escapeHtml(row.company || '（会社名なし）')}</div>
      <div class="phone-row">${phoneHtml}</div>
      ${productHtml}
      ${rakutenHtml}
    </div>
  </div>
  <div class="status-section">
    <div class="status-row">
      <span class="status-label">📞 電話状況</span>
      <div class="status-btns">
        ${telBtnBase('◯',  '◯ 電話連絡済み', 'active-called')}
        ${telBtnBase('×',  '× 電話しない',    'active-nocall')}
        ${telBtnBase('不通','不通',            'active-unreachable')}
      </div>
    </div>
    <div class="status-row">
      <span class="status-label">💼 取引可否</span>
      <div class="status-btns">
        ${dealBtnBase('◯', '◯ 見積もりもらえた', 'active-deal-ok')}
        ${dealBtnBase('×', '× 断られた',         'active-deal-ng')}
      </div>
    </div>
  </div>
</div>`;
}

function onTelClick(rowNum, value) {
  const btns = [
    document.getElementById(`tel-${rowNum}-◯`),
    document.getElementById(`tel-${rowNum}-×`),
    document.getElementById(`tel-${rowNum}-不通`)
  ].filter(Boolean);
  setTelStatus(rowNum, value, btns);
}

function onDealClick(rowNum, value) {
  const btns = [
    document.getElementById(`deal-${rowNum}-◯`),
    document.getElementById(`deal-${rowNum}-×`)
  ].filter(Boolean);
  setDealStatus(rowNum, value, btns);
}

function renderDashboard() {
  let total = 0, called = 0, unreachable = 0, estimate = 0, refused = 0;
  for (const row of allRows) {
    total++;
    const s = getStatus(row.row);
    if (s.telStatus === '◯')  called++;
    if (s.telStatus === '不通') unreachable++;
    if (s.dealStatus === '◯') estimate++;
    if (s.dealStatus === '×') refused++;
  }
  document.getElementById('stat-total').textContent       = total;
  document.getElementById('stat-called').textContent      = called;
  document.getElementById('stat-unreachable').textContent = unreachable;
  document.getElementById('stat-estimate').textContent    = estimate;
  document.getElementById('stat-refused').textContent     = refused;
}

// ===== 設定 =====
function openSettings() {
  document.getElementById('gas-url-input').value = GAS_URL;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
function saveSettings() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) { showToast('URLを入力してください'); return; }
  if (!url.startsWith('https://script.google.com/')) {
    if (!confirm('Google Apps Script のURLではないようです。このまま保存しますか？')) return;
  }
  GAS_URL = url;
  localStorage.setItem(STORAGE_KEY, GAS_URL);
  closeSettings();
  syncNow();
}

// ===== ユーティリティ =====
function setSyncStatus(text, state) {
  document.getElementById('sync-status').textContent = text;
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
