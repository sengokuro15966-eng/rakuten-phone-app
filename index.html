<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽天リサーチ 電話アプリ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

    :root {
      --rakuten-red: #BF0000;
      --rakuten-dark: #8B0000;
      --rakuten-light: #FFE8E8;
      --rakuten-pale: #FFF5F5;
      --white: #FFFFFF;
      --gray-50: #FAFAFA;
      --gray-100: #F5F5F5;
      --gray-200: #EEEEEE;
      --gray-400: #BDBDBD;
      --gray-600: #757575;
      --gray-800: #424242;
      --text: #212121;
      --success: #2E7D32;
      --success-bg: #E8F5E9;
      --warning: #E65100;
      --warning-bg: #FFF3E0;
      --info: #1565C0;
      --info-bg: #E3F2FD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--gray-100);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: var(--rakuten-red);
      color: var(--white);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      font-size: 18px;
      background: white;
      color: var(--rakuten-red);
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
    }
    .logo-text .main { font-size: 16px; font-weight: 900; }
    .logo-text .sub  { font-size: 10px; opacity: 0.85; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-header {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-header:hover { background: rgba(255,255,255,0.3); }

    /* ===== 電話するバナー ===== */
    .call-banner {
      background: linear-gradient(135deg, #FF4444, var(--rakuten-red));
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .call-banner-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .call-banner-icon {
      font-size: 28px;
      animation: ring 1.5s ease-in-out infinite;
    }
    @keyframes ring {
      0%,100% { transform: rotate(0deg); }
      10%      { transform: rotate(-15deg); }
      20%      { transform: rotate(15deg); }
      30%      { transform: rotate(-10deg); }
      40%      { transform: rotate(10deg); }
      50%      { transform: rotate(0deg); }
    }
    .call-banner-text .title {
      color: white;
      font-size: 16px; font-weight: 900;
    }
    .call-banner-text .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      margin-top: 1px;
    }
    .btn-call-now {
      background: white;
      color: var(--rakuten-red);
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 13px; font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.1s;
    }
    .btn-call-now:hover { transform: scale(1.04); }

    /* ===== ダッシュボード ===== */
    .dashboard {
      background: var(--rakuten-dark);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .stat-box {
      flex: 1; min-width: 60px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .stat-val { font-size: 20px; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 10px; opacity: 0.85; margin-top: 3px; }

    /* ===== 同期バー ===== */
    .sync-bar {
      background: var(--gray-200);
      padding: 5px 16px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--gray-600);
    }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: var(--gray-400);
      display: inline-block; margin-right: 5px;
    }
    .sync-dot.ok      { background: #4CAF50; }
    .sync-dot.error   { background: #F44336; }
    .sync-dot.loading { background: #FF9800; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* ===== フィルターバー ===== */
    .filter-bar {
      background: var(--white);
      padding: 10px 16px;
      border-bottom: 2px solid var(--gray-200);
      display: flex; gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--rakuten-red); color: var(--rakuten-red); }
    .filter-btn.active {
      background: var(--rakuten-red);
      border-color: var(--rakuten-red);
      color: var(--white);
    }
    /* 非表示済みフィルターは薄く */
    .filter-btn.hidden-filter {
      border-style: dashed;
      opacity: 0.75;
    }

    /* ===== カードリスト ===== */
    .card-list {
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
      max-width: 720px; margin: 0 auto;
    }

    .maker-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      border-left: 5px solid var(--gray-200);
      transition: border-color 0.2s;
    }
    .maker-card.status-called      { border-left-color: var(--success); }
    .maker-card.status-nocall      { border-left-color: var(--gray-400); }
    .maker-card.status-unreachable { border-left-color: var(--info); }
    .maker-card.status-deal-ok     { background: linear-gradient(135deg, #FAFFFE, #F0FFF4); }
    /* 翌日非表示対象カードは薄く表示（フィルター経由で表示時） */
    .maker-card.hidden-card {
      opacity: 0.6;
      border-left-style: dashed;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-info { flex: 1; min-width: 0; }
    .row-badge { font-size: 10px; color: var(--gray-400); margin-bottom: 2px; }
    .company-name {
      font-size: 15px; font-weight: 900; color: var(--text); line-height: 1.6;
    }
    ruby { ruby-align: center; }
    rt {
      font-size: 10px; font-weight: 400;
      color: var(--gray-600); letter-spacing: 0.5px;
    }

    .phone-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .phone-number { font-size: 16px; font-weight: 700; color: var(--rakuten-red); letter-spacing: 0.5px; }
    .no-phone { color: var(--gray-400); font-size: 13px; }

    /* ===== 電話するボタン（カード内・大） ===== */
    .btn-call-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--rakuten-red);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      margin-top: 0;
      flex: 1;
      justify-content: center;
      transition: background 0.15s;
      box-shadow: 0 2px 6px rgba(191,0,0,0.3);
    }
    .btn-call-card:hover { background: var(--rakuten-dark); }
    .btn-call-card.no-number {
      background: var(--gray-400);
      box-shadow: none;
      cursor: default;
      pointer-events: none;
    }

    .product-name {
      font-size: 12px; color: var(--gray-600);
      margin-top: 4px;
      display: flex; align-items: flex-start; gap: 4px; line-height: 1.4;
    }
    .product-name .label {
      flex-shrink: 0;
      background: var(--rakuten-light);
      color: var(--rakuten-red);
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-top: 1px;
    }

    /* ===== フリガナ入力 ===== */
    .kana-input-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px;
    }
    .kana-input-label {
      flex-shrink: 0;
      font-size: 11px; font-weight: 700; color: var(--gray-600);
      min-width: 52px;
    }
    .kana-input {
      flex: 1;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      background: var(--gray-50);
    }
    .kana-input:focus { border-color: var(--rakuten-red); background: white; }
    .kana-input.saving { opacity: 0.5; }
    .btn-kana-save {
      flex-shrink: 0;
      background: var(--rakuten-red); color: white;
      border: none; border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-kana-save:hover { background: var(--rakuten-dark); }
    .btn-kana-save:disabled { background: var(--gray-400); cursor: default; }

    .btn-rakuten {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(135deg, #FF4444 0%, var(--rakuten-red) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px; font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(191,0,0,0.35);
      letter-spacing: 0.3px;
      flex: 1;
    }
    .btn-rakuten:hover {
      background: linear-gradient(135deg, var(--rakuten-red) 0%, var(--rakuten-dark) 100%);
      box-shadow: 0 4px 12px rgba(191,0,0,0.45);
      transform: translateY(-1px);
    }
    .btn-rakuten:active { transform: translateY(0); }
    .btn-rakuten.no-url {
      background: var(--gray-200);
      color: var(--gray-400);
      box-shadow: none;
      cursor: default;
      pointer-events: none;
    }
    .card-action-row {
      display: flex; gap: 8px; margin-top: 8px;
    }

    /* ===== ステータス操作 ===== */
    .status-section {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--gray-100);
      display: flex; flex-direction: column; gap: 10px;
    }
    .status-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .status-label { font-size: 11px; font-weight: 700; color: var(--gray-600); min-width: 70px; }
    .status-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--gray-600);
    }
    .status-btn:hover { border-color: var(--rakuten-red); color: var(--rakuten-red); }
    .status-btn.active-schedule    { background: #FFF3E0; border-color: #FF6D00; color: #FF6D00; }
    .status-btn.active-called      { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .status-btn.active-nocall      { background: var(--gray-100); border-color: var(--gray-400); color: var(--gray-600); }
    .status-btn.active-unreachable { background: var(--info-bg); border-color: var(--info); color: var(--info); }
    .status-btn.active-deal-ok     { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .status-btn.active-deal-ng     { background: var(--warning-bg); border-color: var(--warning); color: var(--warning); }
    .status-btn.saving { opacity: 0.6; pointer-events: none; }

    /* 翌日非表示バッジ */
    .hidden-badge {
      display: inline-block;
      background: var(--gray-200);
      color: var(--gray-600);
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      margin-top: 6px;
    }

    /* ===== 設定モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px; padding: 24px;
      width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 18px; font-weight: 900; color: var(--rakuten-red); margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--gray-600); line-height: 1.6; margin-bottom: 16px; }
    .modal input {
      width: 100%; padding: 10px 12px;
      border: 2px solid var(--gray-200); border-radius: 8px;
      font-size: 13px; margin-bottom: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--rakuten-red); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      padding: 8px 16px; border-radius: 8px;
      border: 2px solid var(--gray-200); background: var(--white);
      color: var(--gray-600); font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-save {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: var(--rakuten-red); color: var(--white);
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { background: var(--rakuten-dark); }

    /* ===== トースト ===== */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gray-800); color: white;
      padding: 10px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 700;
      opacity: 0; transition: all 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 空状態 ===== */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ===== フッター ===== */
    .footer {
      text-align: center; padding: 24px 16px;
      font-size: 11px; color: var(--gray-400);
      border-top: 1px solid var(--gray-200); margin-top: 20px;
    }
    .footer .designer { color: var(--rakuten-red); font-weight: 700; }

    /* ===== ローディング ===== */
    .loading-spinner { display: none; text-align: center; padding: 40px; color: var(--gray-400); font-size: 14px; }
    .loading-spinner.show { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200); border-top-color: var(--rakuten-red);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">楽</div>
      <div class="logo-text">
        <div class="main">楽天リサーチ 電話アプリ</div>
        <div class="sub">UIデザイン: シルクプリマドンナ</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-header" onclick="syncNow()">🔄 同期</button>
      <button class="btn-header" onclick="openSettings()">⚙️</button>
    </div>
  </div>
</div>

<!-- 電話するバナー -->
<div class="call-banner">
  <div class="call-banner-left">
    <div class="call-banner-icon">📞</div>
    <div class="call-banner-text">
      <div class="title">電話する</div>
      <div class="subtitle" id="call-count-label">読み込み中...</div>
    </div>
  </div>
  <button class="btn-call-now" onclick="setFilter('電話する')">一覧を見る ▶</button>
</div>

<!-- ダッシュボード -->
<div class="dashboard">
  <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">総件数</div></div>
  <div class="stat-box"><div class="stat-val" id="stat-today">0</div><div class="stat-lbl">今日対象</div></div>
  <div class="stat-box"><div class="stat-val" id="stat-called">0</div><div class="stat-lbl">電話済み</div></div>
  <div class="stat-box"><div class="stat-val" id="stat-estimate">0</div><div class="stat-lbl">見積OK</div></div>
  <div class="stat-box"><div class="stat-val" id="stat-refused">0</div><div class="stat-lbl">断られた</div></div>
</div>

<!-- 同期バー -->
<div class="sync-bar">
  <span><span class="sync-dot" id="sync-dot"></span><span id="sync-status">未接続</span></span>
  <span id="sync-time"></span>
</div>

<!-- フィルターバー -->
<div class="filter-bar">
  <button class="filter-btn active" data-filter="電話する" onclick="setFilter('電話する')">📞 電話する</button>
  <button class="filter-btn"        data-filter="all"         onclick="setFilter('all')">すべて</button>
  <button class="filter-btn"        data-filter="未対応"       onclick="setFilter('未対応')">📋 未対応</button>
  <button class="filter-btn hidden-filter" data-filter="called"  onclick="setFilter('called')">✅ 電話済み</button>
  <button class="filter-btn hidden-filter" data-filter="nocall"  onclick="setFilter('nocall')">🚫 電話しない</button>
  <button class="filter-btn"        data-filter="unreachable"  onclick="setFilter('unreachable')">📵 不通</button>
  <button class="filter-btn hidden-filter" data-filter="refused" onclick="setFilter('refused')">❌ 断られた</button>
  <button class="filter-btn"        data-filter="estimate"     onclick="setFilter('estimate')">💰 見積OK</button>
</div>

<!-- ローディング -->
<div class="loading-spinner show" id="loading">
  <div class="spinner"></div>
  データを読み込み中...
</div>

<!-- カードリスト -->
<div class="card-list" id="card-list"></div>

<!-- フッター -->
<div class="footer" id="footer" style="display:none">
  <div>楽天リサーチ 電話管理アプリ</div>
  <div>UIデザイン: <span class="designer">シルクプリマドンナ</span> ｜ PM: アドミラブル</div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ GAS URL 設定</h2>
    <p>Google Apps Script の Web App URL を貼り付けてください。<br>
    同梱の <code>260422_楽天リサーチ電話アプリ_GAS.gs</code> をデプロイして取得したURLです。</p>
    <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/XXXX/exec">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save"   onclick="saveSettings()">保存して同期</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== 設定 =====
const STORAGE_KEY    = 'rakuten_gas_url_v2';
const STATUS_KEY     = 'rakuten_statuses_v2';
let GAS_URL = localStorage.getItem(STORAGE_KEY) || '';

// ===== データ =====
let allRows = [];
let statuses = {};          // { rowNum: { telStatus, dealStatus, statusDate } }
let currentFilter = '電話する';

// ===== 日付ユーティリティ =====
function getTodayStr() {
  const d = new Date();
  return d.getFullYear().toString() +
    (d.getMonth()+1).toString().padStart(2,'0') +
    d.getDate().toString().padStart(2,'0');
}

// ステータスが「翌日から非表示」対象かどうか
function isHideStatus(s) {
  return s.telStatus === '◯' || s.telStatus === '×' || s.dealStatus === '×';
}

// 今日の表示から除外すべきか（昨日以前にhideステータス設定済み）
function shouldHideToday(rowNum) {
  const s = getStatus(rowNum);
  if (!isHideStatus(s)) return false;
  if (!s.statusDate) return false;
  return s.statusDate < getTodayStr(); // 昨日以前に設定 → 非表示
}

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', () => {
  loadLocalStatuses();
  if (GAS_URL) {
    syncNow();
  } else {
    document.getElementById('loading').classList.remove('show');
    setSyncStatus('GAS URLを設定してください', 'error');
    openSettings();
  }
});

// ===== ローカルキャッシュ =====
function loadLocalStatuses() {
  try { statuses = JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); } catch(e) { statuses = {}; }
}
function saveLocalStatuses() {
  try { localStorage.setItem(STATUS_KEY, JSON.stringify(statuses)); } catch(e) {}
}
function getStatus(rowNum) {
  return statuses[rowNum] || { telStatus: '', dealStatus: '', statusDate: '' };
}

// ===== GAS同期 =====
async function syncNow() {
  if (!GAS_URL) { openSettings(); return; }
  setSyncStatus('同期中...', 'loading');
  document.getElementById('loading').classList.add('show');
  try {
    const res = await fetch(GAS_URL + '?action=get&t=' + Date.now());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'APIエラー');
    allRows = data.rows;
    // サーバーステータスでローカルを更新（statusDateは保持）
    for (const r of allRows) {
      const existing = statuses[r.row] || {};
      statuses[r.row] = {
        telStatus:  r.telStatus  || existing.telStatus  || '',
        dealStatus: r.dealStatus || existing.dealStatus || '',
        statusDate: existing.statusDate || (isHideStatus({telStatus: r.telStatus, dealStatus: r.dealStatus}) ? getTodayStr() : '')
      };
    }
    saveLocalStatuses();
    const now = new Date();
    setSyncStatus('同期済み', 'ok');
    document.getElementById('sync-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0') + ' 更新';
    showToast(`✅ ${allRows.length}件を読み込みました`);
  } catch (err) {
    setSyncStatus('同期エラー: ' + err.message, 'error');
    showToast('❌ 同期失敗: ' + err.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('footer').style.display = '';
    renderCards();
  }
}

// ===== シートへ即時書き込み =====
async function pushStatus(rowNum, telStatus, dealStatus) {
  if (!GAS_URL) return;
  const body = { action: 'update', row: rowNum };
  if (telStatus  !== undefined) body.telStatus  = telStatus;
  if (dealStatus !== undefined) body.dealStatus = dealStatus;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
  } catch (err) {
    showToast('⚠️ 書き込みエラー: ' + err.message);
  }
}

// ===== ステータス操作 =====
async function setTelStatus(rowNum, value, btns) {
  const cur = getStatus(rowNum).telStatus;
  const newVal = cur === value ? '' : value;
  const today = getTodayStr();
  statuses[rowNum] = {
    ...getStatus(rowNum),
    telStatus: newVal,
    statusDate: newVal ? today : ''
  };
  saveLocalStatuses();
  renderBtnsState(rowNum);
  renderDashboard();
  updateCardAppearance(rowNum);

  btns.forEach(b => b.classList.add('saving'));
  await pushStatus(rowNum, newVal, undefined);
  btns.forEach(b => b.classList.remove('saving'));
  showToast('保存しました (' + (newVal || '解除') + ')');

  // hideステータスが設定されたら翌日から消える旨を通知
  if (newVal === '◯' || newVal === '×') {
    showToast('明日から自動的に非表示になります');
  }
}

async function setDealStatus(rowNum, value, btns) {
  const cur = getStatus(rowNum).dealStatus;
  const newVal = cur === value ? '' : value;
  const today = getTodayStr();
  statuses[rowNum] = {
    ...getStatus(rowNum),
    dealStatus: newVal,
    statusDate: newVal === '×' ? today : (getStatus(rowNum).statusDate || '')
  };
  saveLocalStatuses();
  renderBtnsState(rowNum);
  renderDashboard();
  updateCardAppearance(rowNum);

  btns.forEach(b => b.classList.add('saving'));
  await pushStatus(rowNum, undefined, newVal);
  btns.forEach(b => b.classList.remove('saving'));
  showToast('保存しました (' + (newVal || '解除') + ')');

  if (newVal === '×') {
    showToast('明日から自動的に非表示になります');
  }
}

function updateCardAppearance(rowNum) {
  const card = document.getElementById('card-' + rowNum);
  if (!card) return;
  const s = getStatus(rowNum);
  card.className = 'maker-card' +
    (s.telStatus === '◯'   ? ' status-called' : '') +
    (s.telStatus === '×'   ? ' status-nocall' : '') +
    (s.telStatus === '不通' ? ' status-unreachable' : '') +
    (s.dealStatus === '◯'  ? ' status-deal-ok' : '') +
    (shouldHideToday(rowNum) ? ' hidden-card' : '');
  // hidden-badgeの更新
  const badge = card.querySelector('.hidden-badge');
  if (badge) badge.style.display = shouldHideToday(rowNum) ? '' : 'none';
}

function renderBtnsState(rowNum) {
  const s = getStatus(rowNum);
  const telEntries = [
    [`tel-${rowNum}-schedule`, '電話する', 'active-schedule'],
    [`tel-${rowNum}-called`,   '◯',        'active-called'],
    [`tel-${rowNum}-nocall`,   '×',        'active-nocall'],
    [`tel-${rowNum}-unreach`,  '不通',      'active-unreachable'],
  ];
  for (const [id, val, cls] of telEntries) {
    const btn = document.getElementById(id);
    if (btn) btn.className = 'status-btn' + (s.telStatus === val ? ' ' + cls : '');
  }
  const dealEntries = [
    [`deal-${rowNum}-ok`, '◯', 'active-deal-ok'],
    [`deal-${rowNum}-ng`, '×', 'active-deal-ng'],
  ];
  for (const [id, val, cls] of dealEntries) {
    const btn = document.getElementById(id);
    if (btn) btn.className = 'status-btn' + (s.dealStatus === val ? ' ' + cls : '');
  }
}

// ===== フィルター =====
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  renderCards();
}

function matchesFilter(row) {
  const s = getStatus(row.row);
  const hideToday = shouldHideToday(row.row);

  switch(currentFilter) {
    case '電話する':     return s.telStatus === '電話する';
    case 'all':          return true;
    case '未対応':       return !s.telStatus && !s.dealStatus;
    case 'called':       return s.telStatus === '◯';
    case 'nocall':       return s.telStatus === '×';
    case 'unreachable':  return s.telStatus === '不通';
    case 'estimate':     return s.dealStatus === '◯';
    case 'refused':      return s.dealStatus === '×';
    default:             return true;
  }
}

// ===== レンダリング =====
function renderCards() {
  const list = document.getElementById('card-list');
  const filtered = allRows.filter(matchesFilter);
  updateCallBanner();

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">${currentFilter === '今日電話する' ? '🎉' : '🔍'}</div>
      <p>${currentFilter === '今日電話する' ? '本日の電話リストはすべて完了！' : '該当するデータがありません'}</p></div>`;
    renderDashboard();
    return;
  }

  list.innerHTML = filtered.map(row => buildCard(row)).join('');
  renderDashboard();
}

function updateCallBanner() {
  const callCount = allRows.filter(r => getStatus(r.row).telStatus === '電話する').length;
  document.getElementById('call-count-label').textContent =
    callCount > 0 ? `電話する ${callCount}件 リストアップ中` : 'リストに追加してから発信しよう';
}

function buildCard(row) {
  const s = getStatus(row.row);
  const hideToday = shouldHideToday(row.row);
  const cardCls = ['maker-card',
    s.telStatus === '◯'    ? 'status-called' : '',
    s.telStatus === '×'    ? 'status-nocall' : '',
    s.telStatus === '不通'  ? 'status-unreachable' : '',
    s.dealStatus === '◯'   ? 'status-deal-ok' : '',
    hideToday ? 'hidden-card' : ''
  ].filter(Boolean).join(' ');

  const telBtnBase = (val, label, activeCls) => {
    const isActive = s.telStatus === val;
    return `<button id="tel-${row.row}-${val.replace(/[◯×]/g, encodeURIComponent)}" class="status-btn${isActive ? ' '+activeCls : ''}"
      onclick="onTelClick(${row.row}, '${val}')">${label}</button>`;
  };
  const dealBtnBase = (val, label, activeCls) => {
    const isActive = s.dealStatus === val;
    return `<button id="deal-${row.row}-${val.replace(/[◯×]/g, encodeURIComponent)}" class="status-btn${isActive ? ' '+activeCls : ''}"
      onclick="onDealClick(${row.row}, '${val}')">${label}</button>`;
  };

  // ボタンIDをシンプルに
  const telScheduleId  = `tel-${row.row}-schedule`;
  const telCalledId    = `tel-${row.row}-called`;
  const telNocallId    = `tel-${row.row}-nocall`;
  const telUnreachId   = `tel-${row.row}-unreach`;
  const dealOkId       = `deal-${row.row}-ok`;
  const dealNgId       = `deal-${row.row}-ng`;

  const telScheduleActive  = s.telStatus === '電話する' ? ' active-schedule'    : '';
  const telCalledActive    = s.telStatus === '◯'        ? ' active-called'      : '';
  const telNocallActive    = s.telStatus === '×'        ? ' active-nocall'      : '';
  const telUnreachActive   = s.telStatus === '不通'     ? ' active-unreachable' : '';
  const dealOkActive       = s.dealStatus === '◯'       ? ' active-deal-ok'     : '';
  const dealNgActive       = s.dealStatus === '×'       ? ' active-deal-ng'     : '';

  const phoneHtml = row.phone
    ? `<span class="phone-number">${escapeHtml(row.phone)}</span>`
    : `<span class="no-phone">電話番号なし</span>`;

  const callBtnHtml = row.phone
    ? `<a class="btn-call-card" href="tel:${escapeHtml(row.phone)}">📞 電話する　${escapeHtml(row.phone)}</a>`
    : `<button class="btn-call-card no-number">📞 電話番号なし</button>`;

  const productDisplay = row.product
    ? `<div class="product-name"><span class="label">商品名</span><span>${rubyText(row.product, row.productKana)}</span></div>`
    : `<div class="product-name"><span class="label">商品名</span><span style="color:var(--gray-400)">（未登録）</span></div>`;

  const rakutenBtnHtml = row.rakutenUrl
    ? `<a class="btn-rakuten" href="${escapeHtml(row.rakutenUrl)}" target="_blank">🛒 楽天市場ページを開く</a>`
    : `<span class="btn-rakuten no-url">🛒 楽天URLなし</span>`;

  const hiddenBadge = hideToday
    ? `<span class="hidden-badge">昨日以前に対応済み（フィルター表示中）</span>`
    : '';

  return `
<div class="maker-card ${cardCls}" id="card-${row.row}">
  <div class="card-top">
    <div class="card-info">
      <div class="row-badge">Row ${row.row}</div>
      <div class="company-name">${rubyText(row.company || '（会社名なし）', row.companyKana)}</div>
      <div class="kana-input-row">
        <span class="kana-input-label">🔤 フリガナ</span>
        <input class="kana-input" id="kana-input-${row.row}"
          type="text" placeholder="カタカナで入力..."
          value="${escapeHtml(row.companyKana || '')}"
          onkeydown="if(event.key==='Enter') saveCompanyKana(${row.row})">
        <button class="btn-kana-save" onclick="saveCompanyKana(${row.row})">保存</button>
      </div>
      <div class="phone-row">${phoneHtml}</div>
      ${productDisplay}
      ${hiddenBadge}
    </div>
  </div>
  <div class="card-action-row">
    ${callBtnHtml}
    ${rakutenBtnHtml}
  </div>
  <div class="status-section">
    <div class="status-row">
      <span class="status-label">📞 電話状況</span>
      <div class="status-btns">
        <button id="${telScheduleId}" class="status-btn${telScheduleActive}" onclick="onTelClick(${row.row}, '電話する')">📞 電話する</button>
        <button id="${telCalledId}"  class="status-btn${telCalledActive}"  onclick="onTelClick(${row.row}, '◯')">◯ 電話した</button>
        <button id="${telNocallId}"  class="status-btn${telNocallActive}"  onclick="onTelClick(${row.row}, '×')">× 電話しない</button>
        <button id="${telUnreachId}" class="status-btn${telUnreachActive}" onclick="onTelClick(${row.row}, '不通')">📵 不通</button>
      </div>
    </div>
    <div class="status-row">
      <span class="status-label">💼 取引可否</span>
      <div class="status-btns">
        <button id="${dealOkId}" class="status-btn${dealOkActive}" onclick="onDealClick(${row.row}, '◯')">◯ 見積もりもらえた</button>
        <button id="${dealNgId}" class="status-btn${dealNgActive}" onclick="onDealClick(${row.row}, '×')">× 断られた</button>
      </div>
    </div>
  </div>
</div>`;
}

function onTelClick(rowNum, value) {
  const ids = [`tel-${rowNum}-schedule`, `tel-${rowNum}-called`, `tel-${rowNum}-nocall`, `tel-${rowNum}-unreach`];
  const btns = ids.map(id => document.getElementById(id)).filter(Boolean);
  setTelStatus(rowNum, value, btns);
}

function onDealClick(rowNum, value) {
  const ids = [`deal-${rowNum}-ok`, `deal-${rowNum}-ng`];
  const btns = ids.map(id => document.getElementById(id)).filter(Boolean);
  setDealStatus(rowNum, value, btns);
}

function renderDashboard() {
  let total = 0, today = 0, called = 0, estimate = 0, refused = 0;
  for (const row of allRows) {
    total++;
    const s = getStatus(row.row);
    if (!shouldHideToday(row.row) && !isHideStatus(s)) today++;
    if (s.telStatus === '◯')  called++;
    if (s.dealStatus === '◯') estimate++;
    if (s.dealStatus === '×') refused++;
  }
  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-today').textContent    = today;
  document.getElementById('stat-called').textContent   = called;
  document.getElementById('stat-estimate').textContent = estimate;
  document.getElementById('stat-refused').textContent  = refused;
}

// ===== フリガナ保存 =====
async function saveCompanyKana(rowNum) {
  const input = document.getElementById(`kana-input-${rowNum}`);
  const btn   = input ? input.nextElementSibling : null;
  if (!input) return;
  const value = input.value.trim();

  input.classList.add('saving');
  if (btn) btn.disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', row: rowNum, companyKana: value })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    const r = allRows.find(r => r.row === rowNum);
    if (r) {
      r.companyKana = value;
      const nameEl = document.querySelector(`#card-${rowNum} .company-name`);
      if (nameEl) nameEl.innerHTML = rubyText(r.company || '', value);
    }
    showToast('✅ フリガナを保存しました');
  } catch(err) {
    showToast('⚠️ 保存エラー: ' + err.message);
  } finally {
    input.classList.remove('saving');
    if (btn) btn.disabled = false;
  }
}

// ===== 設定 =====
function openSettings() {
  document.getElementById('gas-url-input').value = GAS_URL;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) { showToast('URLを入力してください'); return; }
  if (!url.startsWith('https://script.google.com/')) {
    if (!confirm('Google Apps Script のURLではないようです。このまま保存しますか？')) return;
  }
  GAS_URL = url;
  localStorage.setItem(STORAGE_KEY, GAS_URL);
  closeSettings();
  syncNow();
}

// ===== ユーティリティ =====
function setSyncStatus(text, state) {
  document.getElementById('sync-status').textContent = text;
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// フリガナがある場合は<ruby>タグで表示、なければそのまま
function rubyText(text, kana) {
  const t = escapeHtml(text);
  if (!kana) return t;
  return `<ruby>${t}<rt>${escapeHtml(kana)}</rt></ruby>`;
}
</script>
